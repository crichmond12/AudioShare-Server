<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  Audio Share: let the hub's user own shairport-sync's D-Bus / MPRIS names.

  shairport-sync (when built with the dbus + mpris interfaces, as the stock
  Debian/RPi package is) tries to own these names on the SYSTEM bus at startup:
      org.gnome.ShairportSync.<instance>
      org.mpris.MediaPlayer2.ShairportSync.<instance>
  The package's own policies only grant ownership to users "root" and
  "shairport-sync". The hub spawns shairport-sync as whatever user runs
  audioshare_device, so without this file every receiver logs:
      warning: could not acquire ... D-Bus interface ... on the system bus.

  These interfaces are shairport's remote-control / metadata-over-D-Bus feature,
  which Audio Share does not consume (audio rides the -o pipe FIFO; track
  metadata uses shairport's metadata pipe). The warnings are harmless, but this
  policy silences them. shairport appends a per-instance suffix to the name, so
  own_prefix (not own) is required.

  Install (replace `crichmond` with the user that runs audioshare_device):
      sudo install -m 0644 deploy/audioshare-shairport-dbus.conf \
          /etc/dbus-1/system.d/audioshare-shairport-dbus.conf
      sudo systemctl reload dbus
-->
<busconfig>
  <policy user="crichmond">
    <allow own_prefix="org.gnome.ShairportSync"/>
    <allow own_prefix="org.mpris.MediaPlayer2.ShairportSync"/>
  </policy>
</busconfig>
